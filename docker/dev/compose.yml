services:
  childflow-dev:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    working_dir: /workspaces/childflow
    environment:
      CARGO_TARGET_DIR: /tmp/childflow-target
    volumes:
      - ../..:/workspaces/childflow
    tty: true
    stdin_open: true
    privileged: true
    network_mode: host
