name: Feature request
description: Suggest a new capability or workflow improvement
title: "[feature] "
labels:
  - enhancement
body:
  - type: input
    id: problem
    attributes:
      label: Problem to solve
      description: What user problem or workflow gap are you trying to solve?
      placeholder: I need to force only one tool through ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want to see
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include existing tools, shell wrappers, or current workarounds if relevant
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Commands, example profiles, screenshots, or links
