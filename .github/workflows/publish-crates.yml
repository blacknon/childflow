name: Publish Crates

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish in dry-run mode"
        required: true
        default: true
        type: boolean
      git_ref:
        description: "Optional git ref to publish from"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-crates
  cancel-in-progress: false

jobs:
  demo-test:
    uses: ./.github/workflows/demo-test.yml

  publish-crates:
    needs: demo-test
    runs-on: ubuntu-24.04
    environment: crates-io
    timeout-minutes: 30
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.git_ref != '' && inputs.git_ref || github.ref }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify publishable package
        run: cargo package --locked

      - name: Publish crate (dry-run)
        if: inputs.dry_run
        run: cargo publish --locked --dry-run

      - name: Publish crate
        if: ${{ !inputs.dry_run }}
        run: cargo publish --locked
